name: CI

on:
  push:
    branches: ["main", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Format / Lint / Type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: make install-ci

      - name: Check formatting
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Type check
        run: make type

  test:
    name: Unit / API / Security Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: make install-ci

      - name: Run tests (unit + api + security)
        run: make test
        env:
          DATABASE_URL: "postgresql+asyncpg://wol:wol@localhost:5432/wolmonkey"
          APP_SECRET: "ci-test-secret-not-used-in-production-1234567890"

  integration:
    name: Integration Tests (Postgres)
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wol
          POSTGRES_PASSWORD: wol
          POSTGRES_DB: wolmonkey
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: make install-ci

      - name: Run integration tests
        run: make test-integration
        env:
          DATABASE_URL: "postgresql+asyncpg://wol:wol@localhost:5432/wolmonkey"
          APP_SECRET: "ci-test-secret-not-used-in-production-1234567890"
