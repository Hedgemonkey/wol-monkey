version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# WoL-Monkey — homelab stack
#
# Services:
#   db      — Postgres 16
#   migrate — one-shot Alembic upgrade (runs before app + worker start)
#   app     — FastAPI / Gunicorn  (HTTP on :8000 internally)
#   worker  — async job processor  (network_mode: host for L2 WoL)
#   caddy   — reverse proxy / TLS termination on :80 / :443
#
# Copy .env.example → .env and fill in the secrets before first run.
# ──────────────────────────────────────────────────────────────────────────────

x-app-env: &app-env
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-wol}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wolmonkey}"
  APP_SECRET: "${APP_SECRET}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-wol}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-wolmonkey}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wol}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      <<: *app-env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true

  app:
    build: .
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - /sys/class/net:/sys/class/net:ro
      - /proc/1/net:/host/proc/net:ro
      - /etc/hosts:/etc/hosts:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["python", "-m", "worker.main"]
    restart: unless-stopped
    # network_mode: host is required for etherwake (L2 packet access).
    # If you use UDP-broadcast strategy only, remove network_mode and
    # keep this service on the bridge network.
    network_mode: host
    user: root
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-wol}:${POSTGRES_PASSWORD}@127.0.0.1:5432/${POSTGRES_DB:-wolmonkey}"
      APP_SECRET: "${APP_SECRET}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - caddy

volumes:
  pgdata:
  caddy_data:
  caddy_config:
