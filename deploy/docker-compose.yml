# WoL-Monkey — Docker Compose
# Full multi-service compose. See docs/guides/ for deployment guides.
# Phase 0 stub: db service only. Full topology added in Phase 7.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: wol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME}
      POSTGRES_DB: wolmonkey
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wol -d wolmonkey"]
      interval: 5s
      timeout: 5s
      retries: 10

  # web, worker, and caddy services added in Phase 7
  # web:
  #   build: ..
  #   depends_on: [db]
  #   ...
  #
  # worker:
  #   build: ..
  #   network_mode: host
  #   cap_add: [NET_RAW]
  #   depends_on: [db]
  #   ...
  #
  # caddy:
  #   image: caddy:2
  #   ports:
  #     - "${EXTERNAL_HTTP_PORT:-80}:80"
  #     - "${EXTERNAL_HTTPS_PORT:-443}:443"
  #   ...

volumes:
  pgdata:
