<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — WoL-Monkey</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-8">
    <div class="text-center mb-6">
      <span class="text-5xl">🐒</span>
      <h1 class="mt-2 text-2xl font-bold text-gray-900">WoL-Monkey</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your homelab controller</p>
    </div>

    {% if error %}
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-2 text-sm text-red-700">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          id="username" name="username" type="text"
          autocomplete="username" required autofocus
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          value="{{ username | default('') }}"
        />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          id="password" name="password" type="password"
          autocomplete="current-password" required
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <button
        type="submit"
        class="w-full rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
               py-2 text-sm transition-colors"
      >
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
