{% extends "base.html" %}
{% block title %}{{ status_code }} Error{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto text-center py-16">
  <div class="text-6xl font-bold text-gray-200 mb-4">{{ status_code }}</div>
  <h1 class="text-2xl font-bold text-gray-800 mb-2">
    {% if status_code == 404 %}Page not found{% else %}Something went wrong{% endif %}
  </h1>
  <p class="text-gray-500 mb-8">{{ detail }}</p>
  <a href="/machines"
     class="inline-block rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 text-sm transition-colors">
    Back to dashboard
  </a>
</div>
{% endblock %}
