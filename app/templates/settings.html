{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Settings</h1>

{% if saved %}
<div class="mb-4 rounded-lg bg-green-50 border border-green-200 px-4 py-2 text-sm text-green-700">
  Settings saved.
</div>
{% endif %}

<form method="post" action="/settings" class="max-w-lg space-y-6">
  <input type="hidden" name="_csrf" value="{{ csrf_token }}" />

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
    <h2 class="font-semibold text-gray-800 text-sm uppercase tracking-wide">Wake Defaults</h2>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Wake Interface</label>
      <input name="wake_interface" type="text"
             value="{{ settings.wake_interface | default('') }}" placeholder="e.g. eth0"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Default Wake Strategy</label>
      <select name="default_wake_strategy"
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        <option value="etherwake" {% if settings.default_wake_strategy == 'etherwake' %}selected{% endif %}>etherwake</option>
        <option value="udp" {% if settings.default_wake_strategy == 'udp' %}selected{% endif %}>UDP broadcast</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Default Poll Timeout (s)</label>
      <input name="default_poll_timeout_s" type="number" min="10" max="600"
             value="{{ settings.default_poll_timeout_s | default(120) }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
    <h2 class="font-semibold text-gray-800 text-sm uppercase tracking-wide">Security</h2>
    <div class="flex items-center gap-2">
      <input id="allow_api_tokens" name="allow_api_tokens" type="checkbox" value="1"
             {% if settings.allow_api_tokens %}checked{% endif %}
             class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
      <label for="allow_api_tokens" class="text-sm font-medium text-gray-700">Allow API token creation</label>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Session lifetime (hours)</label>
      <input name="session_lifetime_hours" type="number" min="1" max="720"
             value="{{ settings.session_lifetime_hours | default(12) }}"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
    </div>
  </div>

  <button type="submit"
          class="rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 text-sm transition-colors">
    Save settings
  </button>
</form>
{% endblock %}
