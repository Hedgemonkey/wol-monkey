{% extends "base.html" %}
{% block title %}{{ "Edit" if machine else "Add" }} Machine{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">{{ "Edit" if machine else "Add" }} Machine</h1>

  {% if error %}
  <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-2 text-sm text-red-700">
    {{ error }}
  </div>
  {% endif %}

  <form method="post"
        action="{{ '/machines/' + machine.id + '/edit' if machine else '/machines/new' }}"
        class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">

    <input type="hidden" name="_csrf" value="{{ csrf_token }}" />

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
        <input name="name" type="text" required
               value="{{ machine.name if machine else '' }}"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">IP Address *</label>
        <input name="ip_address" type="text" required
               value="{{ machine.ip_address if machine else '' }}"
               placeholder="192.168.1.100"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">MAC Address *</label>
        <input name="mac_address" type="text" required
               value="{{ machine.mac_address if machine else '' }}"
               placeholder="aa:bb:cc:dd:ee:ff"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">SSH Port</label>
        <input name="ssh_port" type="number" min="1" max="65535"
               value="{{ machine.ssh_port if machine else 22 }}"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Hostname</label>
        <input name="hostname" type="text"
               value="{{ machine.hostname if machine else '' }}"
               placeholder="mybox.local"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Wake Strategy</label>
        <select name="wake_strategy"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          <option value="etherwake" {% if not machine or machine.wake_strategy == 'etherwake' %}selected{% endif %}>etherwake (L2)</option>
          <option value="udp_broadcast" {% if machine and machine.wake_strategy == 'udp_broadcast' %}selected{% endif %}>UDP broadcast</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Wake Interface</label>
        <input name="wake_interface" type="text"
               value="{{ machine.wake_interface if machine else '' }}"
               placeholder="eth0"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Broadcast Address</label>
        <input name="broadcast_address" type="text"
               value="{{ machine.broadcast_address if machine else '' }}"
               placeholder="192.168.1.255"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
      </div>

      <div class="col-span-2 flex items-center gap-2">
        <input id="enabled" name="enabled" type="checkbox" value="1"
               {% if not machine or machine.enabled %}checked{% endif %}
               class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
        <label for="enabled" class="text-sm font-medium text-gray-700">Enabled</label>
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="flex-1 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 text-sm transition-colors">
        {{ "Save changes" if machine else "Add machine" }}
      </button>
      <a href="/machines"
         class="flex-1 text-center rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 text-sm transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
